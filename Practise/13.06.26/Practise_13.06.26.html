    class News {
        constructor(title, text, tags, date) {
            this.title = title;
            this.text = text;
            this.tags = tags;
            this.date = date;
        }

        getFormattedDate() {

            let today = new Date();

            let diff = 
                Math.floor(
                    (today-this.date)/
                    (1000*60*60*24)
                );

                if(diff < 1){
                    return "сегодня";
                }
                if(diff < 7){
                    return diff + "дн. назад";
                }

                return this.date.toLocalDateString("uk-UA")
                }
        print() {

            document.write(`
            <div style="
                border:1px black;
                padding:10px;
                margin:10px;
            ">
                <h2>${this.title}</h2>

                <p>
                    <i>${this.getFormattedDate()}</i>
                </p>

                <p>${this.text}</p>

                <p>
                    <b></b>
                    ${this.tags.join(", ")}
                </p>

                
            </div>
            `);
        }       
    }

    let news1 = new News(
        "What is Lorem Ipsum?",
        "bla blalb balbal alb al bla bla bal bl abl abl ball  blalba b albalb al bal b lablablbl balb labl alb blab b lalba bl alb ab ab  la bla balb a lblasbl a blal blab lab lablab lab lal bal bl abl ab lalb al b",

    class NewsFeed {
        constructor() {
            this.news = [];
        }

        get count(){
            return this.news.length;
        }

        showAll() {
            this.news.forEach(item => item.print());
        }

        addNews(newsItem){
            this.news.push(newsItem);
        }

        removeNews(title){
            this.news = this.news.filter(
                item => item.title != title
            );
        }

        sortByDate() {
            this.news.sort(
                (a,b) => b.date - a.date
            );
        }

        findByTag(tag) {

            return this.news.filter(
        item => item.tags.includes(tag)
            );
        }
    }


    let feed = new NewsFeed();
